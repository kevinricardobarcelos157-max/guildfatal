<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🔥 Guild Fatal GOD 🔥</title>

<style>
body {
  margin:0;
  background:black;
  color:#fff;
  font-family: Arial;
  text-align:center;
}

/* VIDEO */
#bgVideo{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  filter:brightness(0.3);
}

/* PAINEL */
.box{
  background:rgba(0,0,0,0.8);
  border:1px solid red;
  margin:10px;
  padding:10px;
}

/* ADMIN ESCONDIDO */
#admin{
  display:none;
}
</style>
</head>

<body>

<video autoplay muted loop id="bgVideo">
  <source src="video.mp4">
</video>

<audio id="musica" loop>
  <source src="musica.mp3">
</audio>

<h1>🔥 GUILD FATAL 🔥</h1>

<div class="box">
<input id="nome" placeholder="Nick">
<input id="classe" placeholder="Classe">
<input id="resets" placeholder="Resets">
<button onclick="enviar()">Entrar</button>
</div>

<div class="box"><ul id="ranking"></ul></div>
<div class="box"><ul id="listaPublica"></ul></div>

<div class="box">
<input id="senha" type="password" placeholder="Senha admin">
<button onclick="login()">Admin</button>
</div>

<div id="admin">
<ul id="pendentes"></ul>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app=initializeApp({
  apiKey:"AIza...",
  authDomain:"fatal-guild.firebaseapp.com",
  projectId:"fatal-guild"
});
const db=getFirestore(app);

/* LOGIN ADMIN (CORRIGIDO) */
window.login = () => {
  const senhaInput = document.getElementById("senha");
  const adminPanel = document.getElementById("admin");

  if (senhaInput.value === "admin123") {
    adminPanel.style.display = "block";
  } else {
    alert("Senha errada");
  }
};

/* CADASTRO */
window.enviar = async () => {
  await addDoc(collection(db,"membros"),{
    nome:nome.value,
    classe:classe.value,
    resets:Number(resets.value),
    status:"pendente"
  });
};

/* LISTAGEM */
onSnapshot(collection(db,"membros"),snap=>{
  listaPublica.innerHTML="";
  ranking.innerHTML="";
  pendentes.innerHTML="";
  let lista=[];

  snap.forEach(d=>{
    let data=d.data();
    let id=d.id;

    if(data.status==="aprovado"){
      lista.push(data);
      listaPublica.innerHTML+=`<li>${data.nome}</li>`;
    }

    if(data.status==="pendente"){
      pendentes.innerHTML+=`
        <li>${data.nome}
        <button onclick="aprovar('${id}')">OK</button>
        </li>`;
    }
  });

  lista.sort((a,b)=>b.resets-a.resets);
  lista.slice(0,5).forEach((p,i)=>{
    ranking.innerHTML+=`<li>#${i+1} ${p.nome} (${p.resets})</li>`;
  });
});

/* APROVAR */
window.aprovar = async (id) => {
  await updateDoc(doc(db,"membros",id),{status:"aprovado"});
};

/* MUSICA */
const musica = document.getElementById("musica");
document.addEventListener("click",()=>{
  musica.play();
});
</script>

</body>
</html>
