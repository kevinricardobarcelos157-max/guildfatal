<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Guild Fatal</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;
}

/* VIDEO FUNDO AJUSTADO */
#bgVideo {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
}

/* CONTEÚDO CENTRAL */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* BOX */
.box {
    background: rgba(0,0,0,0.7);
    border: 1px solid red;
    padding: 25px;
    margin: 10px;
}

/* INPUT */
input {
    padding: 12px;
    margin: 5px;
    width: 220px;
}

/* BOTÃO GAMER */
button {
    padding: 12px 25px;
    margin: 5px;
    border: none;
    background: linear-gradient(45deg, #00f, #0ff);
    color: white;
    cursor: pointer;
    transition: 0.3s;
    font-weight: bold;
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 15px #0ff;
}

/* TÍTULOS */
h1 {
    font-size: 45px;
    color: gold;
    text-shadow: 0 0 15px orange;
}

h3 {
    font-size: 22px;
}
</style>
</head>

<body>

<!-- VIDEO COM SOM -->
<video autoplay loop playsinline id="bgVideo" controls>
    <source src="bg_compressed.mp4" type="video/mp4">
</video>

<div class="container">
    <h1>🔥 GUILD FATAL 🔥</h1>

    <div class="box">
        <h3>Login / Cadastro</h3>

        <input id="email" placeholder="Email"><br>
        <input id="senha" type="password" placeholder="Senha"><br>

        <button onclick="login()">Entrar</button>
        <button onclick="criarConta()">Criar Conta</button>
    </div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU-PROJETO.firebaseapp.com",
  projectId: "SEU-PROJETO",
  storageBucket: "SEU-PROJETO.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// CRIAR CONTA
window.criarConta = function() {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    createUserWithEmailAndPassword(auth, email, senha)
    .then(() => {
        alert("Conta criada com sucesso!");
    })
    .catch(error => {
        alert(error.message);
    });
}

// LOGIN
window.login = function() {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    signInWithEmailAndPassword(auth, email, senha)
    .then(() => {
        alert("Login realizado!");
    })
    .catch(error => {
        alert(error.message);
    });
}
</script>

</body>
    </html>
