<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🔥 Guild Fatal GOD 🔥</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  overflow:hidden;
  background:black;
}

/* VIDEO */
#bgVideo{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
  z-index:-1;
  filter:brightness(0.4);
}

/* TITULO */
#tituloCentral{
  position:fixed;
  top:30%;
  left:50%;
  transform:translate(-50%, -50%);
  z-index:10;
}

#tituloCentral h1{
  font-size:50px;
  color:gold;
  text-shadow:0 0 20px red,0 0 40px gold;
}

/* CENTRALIZA TUDO */
#container{
  position:fixed;
  top:55%;
  left:50%;
  transform:translate(-50%, -50%);
  width:90%;
  max-width:400px;
}

/* BOX */
.box{
  background:rgba(0,0,0,0.85);
  border:1px solid red;
  margin:10px;
  padding:15px;
}

/* BOTÃO */
.btnMU{
  padding:10px;
  background:linear-gradient(45deg,#3a0000,#a00000);
  border:none;
  color:white;
  margin-top:5px;
  width:100%;
}
</style>
</head>

<body>

<!-- VIDEO -->
<video id="bgVideo" autoplay loop muted>
  <source src="bg_compressed.mp4" type="video/mp4">
</video>

<!-- TITULO -->
<div id="tituloCentral">
  <h1>🔥 GUILD FATAL 🔥</h1>
</div>

<!-- CONTAINER CENTRAL -->
<div id="container">

  <!-- LOGIN CONTA -->
  <div class="box">
    <h3>Conta</h3>
    <input id="email" placeholder="Email"><br><br>
    <input id="senhaConta" type="password" placeholder="Senha"><br><br>
    <button class="btnMU" onclick="registrar()">Cadastrar</button>
    <button class="btnMU" onclick="entrarConta()">Entrar</button>
  </div>

  <!-- CADASTRO PERSONAGEM -->
  <div class="box">
    <input id="nome" placeholder="Nick"><br><br>
    <input id="classe" placeholder="Classe"><br><br>
    <input id="resets" placeholder="Resets"><br><br>
    <button class="btnMU" onclick="enviar()">Cadastrar personagem</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app=initializeApp({
  apiKey:"AIza...",
  authDomain:"fatal-guild.firebaseapp.com",
  projectId:"fatal-guild"
});

const db=getFirestore(app);
const auth=getAuth(app);

/* SOM DO VIDEO */
document.addEventListener("click",()=>{
  bgVideo.muted=false;
  bgVideo.play();
});

/* CONTA */
window.registrar = () =>{
  createUserWithEmailAndPassword(auth,email.value,senhaConta.value)
  .then(()=>alert("Conta criada"))
  .catch(e=>alert(e.message));
};

window.entrarConta = () =>{
  signInWithEmailAndPassword(auth,email.value,senhaConta.value)
  .then(()=>alert("Logado"))
  .catch(e=>alert(e.message));
};

/* PERSONAGEM */
window.enviar = async () => {
  await addDoc(collection(db,"membros"),{
    nome:nome.value,
    classe:classe.value,
    resets:Number(resets.value)
  });
};
</script>

</body>
    </html>
