<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🔥 Guild Fatal GOD 🔥</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background:black;
}

/* VIDEO */
#bgVideo{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
  transform:scale(1.2); /* 🔥 DIMINUI ZOOM */
  z-index:-1;
  filter:brightness(0.4);
}

/* TITULO */
#tituloCentral{
  position:absolute;
  top:12%;
  left:50%;
  transform:translateX(-50%);
}

#tituloCentral h1{
  margin:0;
  padding:0;
  font-size:38px;
  font-family:'Cinzel', serif;
  letter-spacing:2px;
  color:gold;
  text-transform:uppercase;

  text-shadow:
    0 0 5px #ff0000,
    0 0 10px #ff0000,
    0 0 20px gold,
    0 0 40px gold;

  animation: glow 2s infinite alternate;
}

@keyframes glow{
  from{ filter:brightness(1);}
  to{ filter:brightness(1.5);}
}

/* CENTRALIZAR CONTAINER */
#container{
  position:absolute;
  top:55%;
  left:50%;
  transform:translate(-50%, -50%);
  width:90%;
  max-width:350px;
}

/* BOX */
.box{
  background:rgba(0,0,0,0.85);
  border:1px solid red;
  margin:10px;
  padding:15px;
}

/* BOTÃO */
.btnMU{
  padding:10px;
  background:linear-gradient(45deg,#3a0000,#a00000);
  border:none;
  color:white;
  margin-top:5px;
  width:100%;
}

.lista{
  text-align:left;
  font-size:14px;
}
</style>
</head>

<body>

<video id="bgVideo" autoplay loop>
  <source src="bg_compressed.mp4" type="video/mp4">
</video>

<div id="tituloCentral">
  <h1>🔥 GUILD FATAL 🔥</h1>
</div>

<div id="container">

  <div class="box">
    <h3>Conta</h3>
    <input placeholder="Email"><br><br>
    <input type="password" placeholder="Senha"><br><br>
    <button class="btnMU">Cadastrar</button>
    <button class="btnMU">Entrar</button>
  </div>

  <div class="box">
    <input placeholder="Nick"><br><br>
    <input placeholder="Classe"><br><br>
    <input placeholder="Resets"><br><br>
    <button class="btnMU">Cadastrar personagem</button>
  </div>

  <div class="box">
    <h3>🏆 Ranking</h3>
  </div>

  <div class="box">
    <h3>📜 Membros</h3>
  </div>

</div>

<script>
// 🔊 ATIVAR SOM NO CLIQUE
document.body.addEventListener("click", ()=>{
  const video = document.getElementById("bgVideo");
  video.muted = false;
  video.play();
});
</script>

</body>
</html>
