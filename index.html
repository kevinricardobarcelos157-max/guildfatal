<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🔥 Painel GM PRO - Mu Online 🔥</title>

<style>
body{
    background:#050505;
    color:#00ffcc;
    font-family:Arial;
    padding:20px;
}

h1{
    text-align:center;
    color:#00ffff;
}

.section{
    border:1px solid #00ffcc;
    padding:15px;
    margin:15px 0;
    border-radius:10px;
}

button{
    background:#00ffcc;
    border:none;
    padding:8px;
    margin:5px;
    cursor:pointer;
    border-radius:5px;
    font-weight:bold;
}

input, select{
    padding:5px;
    margin:5px;
    background:#111;
    color:#0f0;
    border:1px solid #00ffcc;
}

#output{
    background:#111;
    padding:10px;
    margin-top:10px;
    color:#00ff00;
}
</style>
</head>

<body>

<h1>🔥 PAINEL GM PRO 🔥</h1>

<div class="section">
<h2>🎮 Teleporte</h2>

Nick: <input id="nick" placeholder="Nick">
Mapa:
<select id="mapa">
<option value="0">Lorencia</option>
<option value="2">Devias</option>
<option value="3">Noria</option>
<option value="7">Atlans</option>
<option value="8">Tarkan</option>
<option value="33">Aida</option>
</select>

X: <input id="x" value="125">
Y: <input id="y" value="125">

<br>

<button onclick="gmove()">Gerar /gmove</button>
</div>

<div class="section">
<h2>💎 Criador de Item</h2>

Grupo: <input id="g" value="0">
Index: <input id="i" value="19">
Level: <input id="l" value="13">
Skill:
<select id="s">
<option value="1">Sim</option>
<option value="0">Não</option>
</select>

Luck:
<select id="lk">
<option value="1">Sim</option>
<option value="0">Não</option>
</select>

Option: <input id="op" value="7">

Excellent:
<select id="ex">
<option value="32">+10% dmg</option>
<option value="56">FULL (32+16+8)</option>
<option value="0">Nenhum</option>
</select>

<br>

<button onclick="drop()">Gerar /drop</button>
</div>

<div class="section">
<h2>⚔️ Comandos Rápidos</h2>

<button onclick="cmd('/gmoveall')">Mover Todos</button>
<button onclick="cmd('/online')">Players Online</button>
<button onclick="cmd('/fire')">Fogos</button>
<button onclick="cmd('/clearinv')">Limpar Inventário</button>
<button onclick="cmd('/pkclear')">Limpar PK</button>
</div>

<div class="section">
<h2>👤 Controle de Player</h2>

Nick: <input id="nick2" placeholder="Nick">

<br>

<button onclick="player('/disconnect')">Desconectar</button>
<button onclick="player('/trace')">Ir até player</button>
<button onclick="player('/pk')">Dar PK</button>
<button onclick="player('/pkclear')">Limpar PK</button>
</div>

<div class="section">
<h2>📜 Resultado</h2>
<div id="output">Comando aparecerá aqui...</div>
</div>

<script>
function gmove(){
    let nick = document.getElementById("nick").value;
    let mapa = document.getElementById("mapa").value;
    let x = document.getElementById("x").value;
    let y = document.getElementById("y").value;

    document.getElementById("output").innerText =
    `/gmove ${nick} ${mapa} ${x} ${y}`;
}

function drop(){
    let g = document.getElementById("g").value;
    let i = document.getElementById("i").value;
    let l = document.getElementById("l").value;
    let s = document.getElementById("s").value;
    let lk = document.getElementById("lk").value;
    let op = document.getElementById("op").value;
    let ex = document.getElementById("ex").value;

    document.getElementById("output").innerText =
    `/drop ${g} ${i} ${l} ${s} ${lk} ${op} ${ex}`;
}

function cmd(c){
    document.getElementById("output").innerText = c;
}

function player(c){
    let nick = document.getElementById("nick2").value;
    document.getElementById("output").innerText = `${c} ${nick}`;
}
</script>

</body>
</html>
