<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🔥 Guild Fatal GOD 🔥</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background:black;
  overflow-x:hidden;
}

/* VIDEO */
#bgVideo{
  position:fixed;
  top:50%;
  left:50%;
  width:100%;
  height:100%;
  object-fit:cover;
  transform:translate(-50%, -50%) scale(0.75);
  z-index:-6;
  filter:brightness(0.4);
}

/* TITULO 3D */
#tituloCentral{
  position:absolute;
  top:5%;
  left:50%;
  transform:translateX(-50%);
}
#tituloCentral h1{
  font-size:52px;
  font-family:'Cinzel', serif;
  color:#ff0000;
  text-shadow:
    0 0 10px red,
    0 0 20px red,
    2px 2px 0 black,
    4px 4px 10px rgba(0,0,0,0.9);
  animation: glow 2s infinite alternate;
}
@keyframes glow{
  from{ text-shadow:0 0 10px red; }
  to{ text-shadow:0 0 35px red; }
}

/* CONTAINER */
#container{
  position:absolute;
  top:58%;
  left:50%;
  transform:translate(-50%,-50%);
}

/* BOX */
.box{
  background:rgba(20,0,0,0.95);
  padding:20px;
  border:1px solid red;
  width:300px;
  box-shadow:0 0 30px red;
  margin-bottom:10px;
  border-radius:8px;
}

input,select{
  width:90%;
  padding:8px;
  background:#111;
  border:1px solid red;
  color:white;
}

.btnMU{
  padding:10px;
  background:linear-gradient(45deg,#3a0000,#a00000);
  border:none;
  color:white;
  margin-top:5px;
  width:100%;
  cursor:pointer;
  transition:0.3s;
}

.btnMU:hover{
  background:linear-gradient(45deg,#ff0000,#700000);
  box-shadow:0 0 10px red;
}

/* CHAT */
#chatBox{
  height:120px;
  overflow:auto;
  text-align:left;
  font-size:13px;
}

/* RANKING */
#rankingBox p:nth-child(2){color:gold;}
#rankingBox p:nth-child(3){color:silver;}
#rankingBox p:nth-child(4){color:#cd7f32;}

/* MEMBROS */
#membrosBox p{
  border-bottom:1px solid #300;
  padding:3px;
}
</style>
</head>

<body>

<video id="bgVideo" autoplay muted loop>
  <source src="bg_compressed.mp4" type="video/mp4">
</video>

<div id="tituloCentral">
  <h1>🔥 GUILD FATAL 🔥</h1>
</div>

<div id="container">

<!-- LOGIN -->
<div class="box">
<h3>Conta</h3>
<input id="email" placeholder="Email"><br><br>
<input id="senha" type="password" placeholder="Senha"><br><br>

<button class="btnMU" id="btnRegister">Cadastrar</button>
<button class="btnMU" id="btnLogin">Entrar</button>
<button class="btnMU" id="btnLogout">Sair</button>

<hr>

<input id="recoverEmail" placeholder="Recuperar senha (Email)">
<button class="btnMU" id="btnRecover">Recuperar Senha</button>
</div>

<!-- PERSONAGEM -->
<div class="box">
<input id="nick" placeholder="Nick"><br><br>
<input id="classe" placeholder="Classe"><br><br>
<input id="resets" placeholder="Resets"><br><br>
<input id="level" placeholder="Level"><br><br>

<select id="cargo">
<option>Membro</option>
<option>Moderador</option>
<option>Líder</option>
</select><br><br>

<button class="btnMU" id="btnChar">Criar Personagem</button>
</div>

<!-- GUILD -->
<div class="box">
<input id="guildNome" placeholder="Nome da Guild"><br><br>
<button class="btnMU" id="btnCriarGuild">Criar Guild</button>
<button class="btnMU" id="btnEntrarGuild">Entrar Guild</button>

<div id="guildInfo"></div>
</div>

<!-- CHAT -->
<div class="box">
<h3>Chat</h3>
<div id="chatBox"></div>
<input id="msg" placeholder="Mensagem"><br>
<button class="btnMU" id="btnMsg">Enviar</button>
</div>

<div class="box" id="rankingBox"></div>
<div class="box" id="membrosBox"></div>

</div>

<script>
const API="https://fatalguild-api.onrender.com";

/* LOGIN */
btnLogin.onclick=async()=>{
let r=await fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({email:email.value,senha:senha.value})});
let d=await r.json();

if(d.ok){
localStorage.setItem("token",d.token);
alert("Logado!");
}
};

/* RECUPERAR SENHA */
btnRecover.onclick=async()=>{
await fetch(API+"/recover",{method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email:recoverEmail.value})});
alert("Se existir, email enviado!");
};

/* GUILD FEEDBACK */
btnCriarGuild.onclick=async()=>{
let token=localStorage.getItem("token");
await fetch(API+"/guild/criar",{method:"POST",
headers:{"Content-Type":"application/json","Authorization":token},
body:JSON.stringify({nome:guildNome.value})});
guildInfo.innerHTML="<p>Guild criada!</p>";
};

btnEntrarGuild.onclick=async()=>{
let token=localStorage.getItem("token");
await fetch(API+"/guild/entrar",{method:"POST",
headers:{"Content-Type":"application/json","Authorization":token},
body:JSON.stringify({nome:guildNome.value})});
guildInfo.innerHTML="<p>Entrou na guild!</p>";
};

/* CHAT AUTO SCROLL */
async function atualizarChat(){
let token=localStorage.getItem("token");
if(!token) return;

let r=await fetch(API+"/guild/chat",{headers:{"Authorization":token}});
let lista=await r.json();

chatBox.innerHTML=lista.map(m=>`<p>${m}</p>`).join("");
chatBox.scrollTop = chatBox.scrollHeight;
}

/* RANKING PRO */
async function atualizar(){
let r=await fetch(API+"/ranking");
let lista=await r.json();

let rk="<h3>🏆 Ranking TOP 10</h3>";
let mb="<h3>📜 Membros</h3>";

lista.slice(0,10).forEach((p,i)=>{
rk+=`<p>#${i+1} ${p.nick} - ${p.resets}</p>`;
mb+=`<p>${p.nick} | Lv ${p.level}</p>`;
});

rankingBox.innerHTML=rk;
membrosBox.innerHTML=mb;
}

setInterval(()=>{atualizar(); atualizarChat();},4000);
atualizar();
</script>

</body>
</html>
