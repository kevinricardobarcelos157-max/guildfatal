<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐯 Plataforma Tigrinho</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0a0a0a,#1c1c1c);
  color:white;
  text-align:center;
}

/* CONTAINER */
.screen{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active{ display:flex; }

/* CARD */
.card{
  background:#111;
  padding:30px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(255,140,0,0.5);
  width:300px;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:8px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:orange;
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#ffb84d;
}

/* LINKS */
.link{
  margin-top:10px;
  font-size:14px;
  cursor:pointer;
  color:orange;
}

/* DASHBOARD */
#dashboard{
  padding:20px;
}

.games{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:15px;
  margin-top:20px;
}

.game{
  background:#222;
  padding:20px;
  border-radius:10px;
  transition:0.3s;
  cursor:pointer;
}

.game:hover{
  background:orange;
  color:black;
  transform:scale(1.05);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logout{
  background:red;
  color:white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen active">
  <div class="card">
    <h2>🐯 Login</h2>
    <input type="text" id="loginUser" placeholder="Usuário">
    <input type="password" id="loginPass" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <div class="link" onclick="show('register')">Criar conta</div>
    <div class="link" onclick="show('recover')">Esqueci a senha</div>
  </div>
</div>

<!-- REGISTRO -->
<div id="register" class="screen">
  <div class="card">
    <h2>📥 Cadastro</h2>
    <input type="text" id="regUser" placeholder="Usuário">
    <input type="password" id="regPass" placeholder="Senha">
    <button onclick="register()">Cadastrar</button>
    <div class="link" onclick="show('login')">Voltar</div>
  </div>
</div>

<!-- RECUPERAÇÃO -->
<div id="recover" class="screen">
  <div class="card">
    <h2>🔐 Recuperar senha</h2>
    <input type="text" placeholder="Digite seu usuário">
    <button onclick="alert('Senha enviada (simulação)')">Recuperar</button>
    <div class="link" onclick="show('login')">Voltar</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen">
  <div class="header">
    <h2>🎰 Jogos</h2>
    <button class="logout" onclick="logout()">Sair</button>
  </div>

  <div class="games">
    <div class="game">🐯 Fortune Tiger</div>
    <div class="game">🐰 Fortune Rabbit</div>
    <div class="game">🐉 Dragon Fortune</div>
    <div class="game">🎲 Slots</div>
    <div class="game">🎯 Crash</div>
    <div class="game">🎰 Roleta</div>
  </div>
</div>

<script>
function show(screen){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screen).classList.add('active');
}

// Simulação de banco
let users = JSON.parse(localStorage.getItem("users")) || {};

function register(){
  let user = document.getElementById("regUser").value;
  let pass = document.getElementById("regPass").value;

  if(!user || !pass) return alert("Preencha tudo!");

  users[user] = pass;
  localStorage.setItem("users", JSON.stringify(users));

  alert("Conta criada!");
  show('login');
}

function login(){
  let user = document.getElementById("loginUser").value;
  let pass = document.getElementById("loginPass").value;

  if(users[user] === pass){
    show('dashboard');
  } else {
    alert("Login inválido");
  }
}

function logout(){
  show('login');
}
</script>

</body>
                                                                    </html>
