<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🔥 Guild Fatal GOD 🔥</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  overflow:hidden;
}

/* 🎥 VIDEO COM SOM */
#bgVideo{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
}

/* 🔥 TELA INICIAL */
#startScreen{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:rgba(0,0,0,0.4);
}

#startScreen h1{
  font-size:40px;
  color:gold;
  text-shadow:0 0 20px red;
}

#startScreen button{
  padding:15px;
  margin-top:20px;
  background:red;
  border:none;
  color:white;
  cursor:pointer;
}

/* 🔐 LOGIN */
#loginScreen{
  display:none;
  position:absolute;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
}

.box{
  background:rgba(0,0,0,0.8);
  padding:20px;
  border:1px solid red;
}

/* 🧾 SISTEMA */
#sistema{
  display:none;
}
</style>
</head>

<body>

<!-- 🎥 VIDEO COM SOM -->
<video autoplay loop id="bgVideo">
  <source src="video.mp4" type="video/mp4">
</video>

<!-- 🔥 TELA INICIAL -->
<div id="startScreen">
  <h1>🔥 GUILD FATAL 🔥</h1>
  <p>Domine o servidor</p>
  <button onclick="entrarSite()">ENTRAR</button>
</div>

<!-- 🔐 LOGIN -->
<div id="loginScreen">
  <div class="box">
    <h2>Login</h2>
    <input id="user" placeholder="Usuário"><br><br>
    <input id="pass" type="password" placeholder="Senha"><br><br>
    <button onclick="logar()">Entrar</button>
  </div>
</div>

<!-- 🧾 SISTEMA -->
<div id="sistema">

  <div class="box">
    <input id="nome" placeholder="Nick">
    <input id="classe" placeholder="Classe">
    <input id="resets" placeholder="Resets">
    <button onclick="enviar()">Cadastrar</button>
  </div>

  <div class="box"><ul id="ranking"></ul></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app=initializeApp({
  apiKey:"AIza...",
  authDomain:"fatal-guild.firebaseapp.com",
  projectId:"fatal-guild"
});
const db=getFirestore(app);

/* 🎮 ENTRAR */
window.entrarSite = () => {
  startScreen.style.display = "none";
  loginScreen.style.display = "flex";
};

/* 🔐 LOGIN SIMPLES */
window.logar = () => {
  if(user.value === "admin" && pass.value === "123"){
    loginScreen.style.display = "none";
    sistema.style.display = "block";
  } else {
    alert("Login inválido");
  }
};

/* 📥 CADASTRO */
window.enviar = async () => {
  await addDoc(collection(db,"membros"),{
    nome:nome.value,
    classe:classe.value,
    resets:Number(resets.value)
  });
};

/* 🏆 RANKING */
onSnapshot(collection(db,"membros"),snap=>{
  ranking.innerHTML="";
  let lista=[];
  snap.forEach(d=>lista.push(d.data()));
  lista.sort((a,b)=>b.resets-a.resets);
  lista.forEach((p,i)=>{
    ranking.innerHTML+=`<li>#${i+1} ${p.nome} (${p.resets})</li>`;
  });
});
</script>

</body>
</html>
