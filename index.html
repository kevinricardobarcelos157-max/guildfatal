<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🔥 Guild Fatal 🔥</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial;
    color: white;
    text-align: center;
    overflow: hidden;
}

/* VIDEO FUNDO */
#bgVideo {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
}

/* CAIXAS */
.box {
    background: rgba(0,0,0,0.7);
    border: 1px solid red;
    margin: 10px;
    padding: 10px;
}

input, button {
    padding: 8px;
    margin: 5px;
}

h1 {
    color: gold;
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop playsinline id="bgVideo">
    <source src="bg_compressed.mp4" type="video/mp4">
</video>

<h1>🔥 GUILD FATAL 🔥</h1>

<!-- LOGIN -->
<div class="box">
    <h3>Login</h3>
    <input placeholder="Usuário">
    <input type="password" placeholder="Senha"><br>
    <button>Entrar</button>
    <button>Criar Conta</button>
    <button>Recuperar Senha</button>
</div>

<!-- RANK -->
<div class="box">
    <h3>Ranking</h3>
</div>

</body>
  </html>
