<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🔥 Guild Fatal 🔥</title>

<style>
body{
    margin:0;
    font-family:Arial;
    color:white;
    text-align:center;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

/* VIDEO FUNDO */
#bgVideo{
    position: fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    object-fit: cover;
    z-index:-2;
}

/* CAMADA ESCURA + BLUR */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    backdrop-filter: blur(6px);
    background:rgba(0,0,0,0.5);
    z-index:-1;
}

/* BOX */
.box{
    background:rgba(0,0,0,0.6);
    border:1px solid red;
    margin:15px;
    padding:25px;
    width:90%;
    max-width:400px;
    border-radius:10px;
    box-shadow:0 0 15px red;
}

/* INPUTS */
input{
    padding:15px;
    margin:8px;
    font-size:18px;
    width:90%;
    max-width:300px;
    border:none;
    border-radius:5px;
}

/* BOTÕES */
button{
    padding:15px;
    margin:8px;
    font-size:18px;
    width:90%;
    max-width:300px;
    border:none;
    border-radius:5px;
    background:red;
    color:white;
    cursor:pointer;

    transition: all 0.3s ease;
}

/* EFEITO FLOAT + GLOW */
button:hover{
    transform: translateY(-5px) scale(1.05);
    box-shadow:0 0 20px red;
}

/* TITULO PRINCIPAL */
h1{
    color:gold;
    font-size:55px;
    margin-bottom:20px;
    text-shadow: 0 0 10px gold, 0 0 20px orange;
}

/* TITULOS */
h3{
    font-size:30px;
    margin-bottom:15px;
    text-shadow:0 0 10px red;
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop playsinline id="bgVideo">
    <source src="bg_compressed.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<h1>🔥 GUILD FATAL 🔥</h1>

<!-- LOGIN -->
<div class="box">
    <h3>Login ADM</h3>
    <input placeholder="Usuário">
    <input type="password" placeholder="Senha">
    <br>
    <button>Entrar</button>
    <button>Criar Conta</button>
    <button>Recuperar Senha</button>
</div>

<!-- RANKING -->
<div class="box">
    <h3>Ranking</h3>
</div>

</body>
</html>
