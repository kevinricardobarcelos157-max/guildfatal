<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Guild Fatal</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background:black;
}

#bgVideo{
  position:fixed;
  top:50%;
  left:50%;
  width:100%;
  height:100%;
  object-fit:cover;
  transform:translate(-50%,-50%);
  z-index:-2;
  filter:brightness(0.7);
}

body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(255,0,0,0.08);
  z-index:-1;
}

/* TITULO */
.titulo3d{
  font-family: 'Cinzel', serif;
  font-size:48px;
  margin-top:40px;
  color:#e60000;
  letter-spacing:4px;
  text-shadow: 2px 2px 10px black, 0 0 15px red;
}

/* CONTAINER */
#container{
  margin:40px auto;
  width:90%;
  max-width:350px;
}

@media (min-width:768px){
  #container{ max-width:280px; }
}

/* BOX */
.box{
  background:rgba(20,0,0,0.8);
  border:1px solid red;
  margin:10px;
  padding:15px;
  box-shadow:0 0 15px red;
}

/* INPUT */
input{
  width:90%;
  padding:8px;
  background:#1a0000;
  border:1px solid red;
  color:white;
}

input:focus{
  outline:none;
  box-shadow:0 0 8px red;
}

/* BOTÃO */
.btnMU{
  padding:10px;
  background:linear-gradient(45deg,#5a0000,#ff0000);
  border:none;
  color:white;
  margin-top:5px;
  width:100%;
  cursor:pointer;
}

.btnMU:hover{
  transform:scale(1.05);
}

/* 🏆 TOP 1 ANIMADO */
.top1{
  color:gold;
  font-weight:bold;
  animation: brilho 1s infinite alternate;
}

@keyframes brilho{
  from{ text-shadow:0 0 5px gold; }
  to{ text-shadow:0 0 20px gold; }
}

/* 💬 CHAT CORES */
.lider{ color: gold; }
.oficial{ color: cyan; }
.membro{ color: white; }

</style>
</head>

<body>

<video id="bgVideo" autoplay muted loop>
  <source src="bg_compressed.mp4" type="video/mp4">
</video>

<h1 class="titulo3d">GUILD FATAL</h1>

<div id="container">

<div class="box">
<h3>Conta</h3>
<input id="email" placeholder="Email"><br><br>
<input id="senha" type="password" placeholder="Senha"><br><br>

<button class="btnMU" onclick="registrar()">Cadastrar</button>
<button class="btnMU" onclick="login()">Entrar</button>
<button class="btnMU" onclick="virarAdminSeguro()">Virar Líder 👑</button>
</div>

<div class="box">
<input id="nick" placeholder="Nick"><br><br>
<input id="classe" placeholder="Classe"><br><br>
<input id="resets" placeholder="Resets"><br><br>
<button class="btnMU" onclick="criarPersonagem()">Cadastrar personagem</button>
</div>

<div class="box" id="rankingBox"></div>
<div class="box" id="membrosBox"></div>

<div class="box">
<h3>💬 Chat</h3>
<div id="chatBox" style="height:150px;overflow:auto;text-align:left;"></div>
<input id="msg" placeholder="Mensagem">
<button class="btnMU" onclick="enviarMsg()">Enviar</button>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "SUA_KEY_AQUI",
  authDomain: "fatal-guild.firebaseapp.com",
  projectId: "fatal-guild"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let usuarioAtual=null;
let meuCargo=null;

/* 🔊 SOM */
document.body.addEventListener("click", ()=>{
  const v=document.getElementById("bgVideo");
  v.muted=false;
  v.play().catch(()=>{});
},{once:true});

/* AUTH */
async function registrar(){
  const cred=await auth.createUserWithEmailAndPassword(email.value,senha.value);
  await db.collection("usuarios").doc(cred.user.uid).set({
    email:email.value,
    cargo:"Membro"
  });
  alert("Conta criada!");
}

async function login(){
  const cred=await auth.signInWithEmailAndPassword(email.value,senha.value);
  usuarioAtual=cred.user;

  const doc=await db.collection("usuarios").doc(usuarioAtual.uid).get();
  meuCargo=doc.exists?doc.data().cargo:"Membro";

  atualizarSistema();
  carregarChat();
}

/* LÍDER */
async function virarAdminSeguro(){
  if(usuarioAtual.email!=="SEUEMAIL@gmail.com") return alert("Sem permissão");
  await db.collection("usuarios").doc(usuarioAtual.uid).update({cargo:"Lider"});
  meuCargo="Lider";
}

/* PERSONAGEM */
async function criarPersonagem(){
  await db.collection("personagens").add({
    uid:usuarioAtual.uid,
    nick:nick.value,
    classe:classe.value,
    resets:Number(resets.value)||0
  });
  atualizarSistema();
}

/* 🏆 RANKING ANIMADO */
async function atualizarSistema(){
  let rankingHTML="<h3>🏆 Ranking</h3>";
  let membrosHTML="<h3>📜 Membros</h3>";

  const ranking=await db.collection("personagens").orderBy("resets","desc").get();

  ranking.forEach((doc,i)=>{
    const p=doc.data();
    rankingHTML+=`<p class="${i==0?'top1':''}">
      ${i==0?'👑':''} ${p.nick} - ${p.resets}
    </p>`;
  });

  const membros=await db.collection("usuarios").get();

  membros.forEach(doc=>{
    const u=doc.data();
    membrosHTML+=`
    <p>
      ${u.email} - ${u.cargo}
      ${meuCargo==="Lider" ? `<button onclick="promover('${doc.id}')">⬆️</button>` : ""}
    </p>`;
  });

  rankingBox.innerHTML=rankingHTML;
  membrosBox.innerHTML=membrosHTML;
}

/* 🔼 PROMOVER */
async function promover(uid){
  if(meuCargo!=="Lider") return;

  const ref=db.collection("usuarios").doc(uid);
  const doc=await ref.get();
  const u=doc.data();

  let novo="Membro";
  if(u.cargo==="Membro") novo="Oficial";
  else if(u.cargo==="Oficial") novo="Lider";

  await ref.update({cargo:novo});
  atualizarSistema();
}

/* 💬 CHAT COM CARGO */
function carregarChat(){
  db.collection("chat").orderBy("time").limit(50)
  .onSnapshot(async snap=>{
    let html="";

    for(const d of snap.docs){
      const m=d.data();

      const userSnap=await db.collection("usuarios")
        .where("email","==",m.user).get();

      let cargo="membro";
      userSnap.forEach(u=>{
        cargo=u.data().cargo.toLowerCase();
      });

      html+=`<p class="${cargo}">
        <b>${m.user}:</b> ${m.texto}
      </p>`;
    }

    chatBox.innerHTML=html;
  });
}

async function enviarMsg(){
  await db.collection("chat").add({
    user:usuarioAtual.email,
    texto:msg.value,
    time:Date.now()
  });
  msg.value="";
}
</script>

</body>
  </html>
