<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🔥 Guild Fatal GOD 🔥</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background:black;
}

/* VIDEO */
#bgVideo{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
  transform:scale(0.9);
  z-index:-2;
  filter:brightness(0.4);
}

/* TITULO */
#tituloCentral{
  position:absolute;
  top:10%;
  left:50%;
  transform:translateX(-50%);
}

#tituloCentral h1{
  margin:0;
  font-size:44px;
  font-family:'Cinzel', serif;
  letter-spacing:3px;
  text-transform:uppercase;
  color:#8b0000;

  text-shadow:
    2px 2px 0 #000,
    4px 4px 0 #220000,
    6px 6px 0 #440000,
    8px 8px 10px black;

  animation: glowDark 2s infinite alternate;
}

#tituloCentral h1::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  top:100%;
  height:20px;
  background:linear-gradient(to bottom, rgba(139,0,0,0.8), transparent);
  filter:blur(2px);
  animation:sangue 2s infinite alternate;
}

/* SUBTITULO */
#subTitulo{
  margin-top:5px;
  font-size:18px;
  color:#ccc;
  letter-spacing:2px;
  font-family:'Cinzel', serif;
  text-shadow:0 0 15px red;
}

/* LOGO */
#logoMain{
  position:absolute;
  top:22%;
  left:50%;
  transform:translateX(-50%);
}

#logoMain img{
  width:220px;
  max-width:80%;
  filter:drop-shadow(0 0 25px red);
  animation: flutuar 3s infinite ease-in-out, pulseGlow 2s infinite alternate;
}

/* 🔥 FOGO PARTÍCULAS */
#fire{
  position:absolute;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  width:260px;
  height:200px;
  pointer-events:none;
}

.fireParticle{
  position:absolute;
  bottom:0;
  width:6px;
  height:6px;
  background:orange;
  border-radius:50%;
  opacity:0.8;
  animation: subir 2s linear infinite;
}

@keyframes subir{
  0%{
    transform:translateY(0) scale(1);
    opacity:1;
  }
  100%{
    transform:translateY(-180px) scale(0.2);
    opacity:0;
  }
}

/* CONTAINER */
#container{
  position:absolute;
  top:55%;
  left:50%;
  transform:translate(-50%, -50%);
  width:90%;
  max-width:350px;
}

/* LOGO FUNDO */
#logoFundo{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  z-index:-1;
}

#logoFundo img{
  width:300px;
  opacity:0.08;
  filter:blur(1px);
}

/* BOX */
.box{
  background:rgba(0,0,0,0.85);
  border:1px solid red;
  margin:10px;
  padding:15px;
}

/* BOTÃO */
.btnMU{
  padding:10px;
  background:linear-gradient(45deg,#3a0000,#a00000);
  border:none;
  color:white;
  margin-top:5px;
  width:100%;
}

/* ANIMAÇÕES */
@keyframes flutuar{
  0%{ transform:translate(-50%,0px);}
  50%{ transform:translate(-50%,10px);}
  100%{ transform:translate(-50%,0px);}
}

@keyframes glowDark{
  from{ text-shadow:2px 2px 0 #000, 4px 4px 0 #220000, 6px 6px 0 #440000, 0 0 10px red;}
  to{ text-shadow:2px 2px 0 #000, 4px 4px 0 #330000, 6px 6px 0 #660000, 0 0 25px red;}
}

@keyframes sangue{
  from{ height:10px; opacity:0.6;}
  to{ height:25px; opacity:1;}
}

@keyframes pulseGlow{
  from{ filter:drop-shadow(0 0 15px red);}
  to{ filter:drop-shadow(0 0 35px red);}
}
</style>
</head>

<body>

<video id="bgVideo" autoplay loop>
  <source src="bg_compressed.mp4" type="video/mp4">
</video>

<div id="tituloCentral">
  <h1>🔥 GUILD FATAL 🔥</h1>
  <div id="subTitulo">Fatal Guilds</div>
</div>

<!-- 🔥 FOGO PARTÍCULAS -->
<div id="fire"></div>

<!-- LOGO -->
<div id="logoMain">
  <img src="logo1.jpg">
</div>

<div id="container">

  <div id="logoFundo">
    <img src="logo2.png">
  </div>

  <div class="box">
    <h3>Conta</h3>
    <input placeholder="Email"><br><br>
    <input type="password" placeholder="Senha"><br><br>
    <button class="btnMU">Cadastrar</button>
    <button class="btnMU">Entrar</button>
  </div>

  <div class="box">
    <input placeholder="Nick"><br><br>
    <input placeholder="Classe"><br><br>
    <input placeholder="Resets"><br><br>
    <button class="btnMU">Cadastrar personagem</button>
  </div>

  <div class="box">
    <h3>🏆 Ranking</h3>
  </div>

  <div class="box">
    <h3>📜 Membros</h3>
  </div>

</div>

<script>
// 🔊 SOM
document.body.addEventListener("click", ()=>{
  const video = document.getElementById("bgVideo");
  video.muted = false;
  video.play();
});

// 🔥 GERAR PARTÍCULAS DE FOGO
const fire = document.getElementById("fire");

setInterval(()=>{
  const p = document.createElement("div");
  p.className = "fireParticle";
  p.style.left = Math.random()*260 + "px";
  fire.appendChild(p);

  setTimeout(()=>{ p.remove(); },2000);
},100);
</script>

</body>
</html>
