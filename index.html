<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🔥 Guild Fatal GOD 🔥</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background:black;
  overflow:hidden;
}

/* VIDEO */
#bgVideo{
  position:fixed;
  top:50%;
  left:50%;
  width:100%;
  height:100%;
  object-fit:cover;
  transform:translate(-50%, -50%) scale(0.75);
  z-index:-6;
  filter:brightness(0.4);
}

/* CANVAS */
canvas{position:fixed;top:0;left:0;pointer-events:none;}
#lightning{z-index:-5;}
#lava{z-index:-4;}
#magic{z-index:-3;}

/* UI */
.box{
  background:rgba(20,0,0,0.95);
  padding:20px;
  border:1px solid red;
  width:300px;
  box-shadow:0 0 30px red;
  margin:10px auto;
}

.gold{color:gold;text-shadow:0 0 15px gold;}

input,select{
  width:90%;
  padding:8px;
  background:#111;
  border:1px solid red;
  color:white;
}

.btnMU{
  padding:10px;
  background:linear-gradient(45deg,#3a0000,#a00000);
  border:none;
  color:white;
  margin-top:5px;
  width:100%;
  cursor:pointer;
}
</style>
</head>

<body>

<video id="bgVideo" autoplay muted loop>
  <source src="bg_compressed.mp4" type="video/mp4">
</video>

<canvas id="lightning"></canvas>
<canvas id="lava"></canvas>
<canvas id="magic"></canvas>

<!-- LOGIN -->
<div class="box" id="loginBox">
<h3>Login</h3>
<input id="email" placeholder="Email"><br><br>
<input id="senha" type="password" placeholder="Senha"><br><br>

<button class="btnMU" id="btnRegister">Cadastrar</button>
<button class="btnMU" id="btnLogin">Entrar</button>
</div>

<!-- PAINEL -->
<div id="painel" style="display:none">

<div class="box">
<h3>Painel</h3>
<button class="btnMU" id="btnLogout">Sair</button>
</div>

<div class="box">
<h3>Personagem</h3>
<input id="nick" placeholder="Nick"><br><br>
<input id="classe" placeholder="Classe"><br><br>
<input id="resets" placeholder="Resets"><br><br>
<input id="level" placeholder="Level"><br><br>

<select id="cargo">
<option>Membro</option>
<option>Moderador</option>
<option>Líder</option>
</select><br><br>

<button class="btnMU" id="btnChar">Criar Personagem</button>
</div>

<!-- GUILD -->
<div class="box">
<h3>Guilda</h3>
<input id="guildNome" placeholder="Nome da Guild"><br><br>

<button class="btnMU" id="btnCriarGuild">Criar Guild</button>
<button class="btnMU" id="btnEntrarGuild">Entrar Guild</button>

<div id="guildInfo"></div>

<input id="membroNome" placeholder="Nome do membro"><br>
<button class="btnMU" id="btnPromover">Promover</button>
<button class="btnMU" id="btnRemover">Remover</button>
</div>

<!-- CHAT -->
<div class="box">
<h3>Chat da Guild</h3>
<div id="chatBox" style="height:120px;overflow:auto;"></div>
<input id="msg" placeholder="Mensagem"><br>
<button class="btnMU" id="btnMsg">Enviar</button>
</div>

<div class="box" id="rankingBox"></div>

</div>

<script>
const API="https://fatalguild-api.onrender.com";

/* AUTO LOGIN */
window.onload=()=>{
let token=localStorage.getItem("token");
if(token){
loginBox.style.display="none";
painel.style.display="block";
}
};

/* LOGIN */
btnLogin.onclick=async()=>{
let r=await fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email:email.value,senha:senha.value})
});
let d=await r.json();

if(d.ok){
localStorage.setItem("token",d.token);
location.reload();
}else alert("Erro login");
};

/* REGISTER */
btnRegister.onclick=async()=>{
await fetch(API+"/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email:email.value,senha:senha.value})
});
alert("Conta criada!");
};

/* LOGOUT */
btnLogout.onclick=()=>{
localStorage.removeItem("token");
location.reload();
};

/* PERSONAGEM */
btnChar.onclick=async()=>{
let token=localStorage.getItem("token");

await fetch(API+"/personagem",{
method:"POST",
headers:{"Content-Type":"application/json","Authorization":token},
body:JSON.stringify({
nick:nick.value,
classe:classe.value,
resets:+resets.value,
level:+level.value,
cargo:cargo.value
})
});
alert("OK");
};

/* GUILD */
btnCriarGuild.onclick=async()=>{
let token=localStorage.getItem("token");
await fetch(API+"/guild/criar",{method:"POST",headers:{"Content-Type":"application/json","Authorization":token},body:JSON.stringify({nome:guildNome.value})});
};

btnEntrarGuild.onclick=async()=>{
let token=localStorage.getItem("token");
await fetch(API+"/guild/entrar",{method:"POST",headers:{"Content-Type":"application/json","Authorization":token},body:JSON.stringify({nome:guildNome.value})});
};

btnPromover.onclick=async()=>{
let token=localStorage.getItem("token");
await fetch(API+"/guild/promover",{method:"POST",headers:{"Content-Type":"application/json","Authorization":token},body:JSON.stringify({nome:membroNome.value})});
};

btnRemover.onclick=async()=>{
let token=localStorage.getItem("token");
await fetch(API+"/guild/remover",{method:"POST",headers:{"Content-Type":"application/json","Authorization":token},body:JSON.stringify({nome:membroNome.value})});
};

/* CHAT */
btnMsg.onclick=async()=>{
let token=localStorage.getItem("token");
await fetch(API+"/guild/chat",{method:"POST",headers:{"Content-Type":"application/json","Authorization":token},body:JSON.stringify({msg:msg.value})});
msg.value="";
};

async function atualizarChat(){
let token=localStorage.getItem("token");
if(!token) return;

let r=await fetch(API+"/guild/chat",{headers:{"Authorization":token}});
let lista=await r.json();

let html="";
lista.forEach(m=>{
html+=`<p>${m}</p>`;
});
chatBox.innerHTML=html;
}

/* GUILD INFO */
async function atualizarGuild(){
let token=localStorage.getItem("token");
let r=await fetch(API+"/guild",{headers:{"Authorization":token}});
let g=await r.json();

if(g.nome){
let html="<h4>"+g.nome+"</h4>";
g.membros.forEach(m=> html+=`<p>${m}</p>`);
guildInfo.innerHTML=html;
}
}

/* RANKING */
async function atualizar(){
let r=await fetch(API+"/ranking");
let lista=await r.json();

let html="<h3>Ranking</h3>";

lista.forEach((p,i)=>{
if(i==0){
html+=`<p class='gold'>🥇 ${p.nick} - ${p.resets}</p>`;
}else{
html+=`<p>${p.nick} - ${p.resets}</p>`;
}
});

rankingBox.innerHTML=html;
}

/* LOOP */
setInterval(()=>{
atualizar();
atualizarGuild();
atualizarChat();
},4000);

atualizar();

/* SOM */
document.body.onclick=()=>{bgVideo.muted=false;bgVideo.play();};

/* EFEITOS */
let l=lightning.getContext("2d");
lightning.width=innerWidth;lightning.height=innerHeight;
function lightningFx(){
l.clearRect(0,0,innerWidth,innerHeight);
if(Math.random()<0.02){
l.strokeStyle="white";
l.beginPath();
l.moveTo(Math.random()*innerWidth,0);
l.lineTo(Math.random()*innerWidth,innerHeight);
l.stroke();
}
requestAnimationFrame(lightningFx);
}
lightningFx();

let ctx=lava.getContext("2d");
lava.width=innerWidth;lava.height=innerHeight;
let t=0;
function lavaFx(){
ctx.clearRect(0,0,lava.width,lava.height);
ctx.beginPath();
ctx.moveTo(0,lava.height);
for(let x=0;x<=lava.width;x+=10){
ctx.lineTo(x,lava.height-100+Math.sin(x*0.01+t)*10);
}
ctx.lineTo(lava.width,lava.height);
ctx.fillStyle="red";
ctx.fill();
t+=0.05;
requestAnimationFrame(lavaFx);
}
lavaFx();

let m=magic.getContext("2d");
magic.width=innerWidth;magic.height=innerHeight;
function magicFx(){
m.fillStyle="purple";
m.fillRect(Math.random()*innerWidth,Math.random()*innerHeight,2,2);
requestAnimationFrame(magicFx);
}
magicFx();
</script>

</body>
  </html>
