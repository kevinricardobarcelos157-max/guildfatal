<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Guild Fatal</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  overflow:hidden;
  color:white;
}

/* VIDEO FUNDO */
#bgVideo{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  filter:brightness(0.7);
}

/* CENTRAL */
.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  text-align:center;
}

/* TITULO */
h1{
  font-size:48px;
  color:#00bfff;
  text-shadow:0 0 20px #00bfff;
}

/* BOX */
.box{
  background:rgba(0,0,0,0.7);
  padding:25px;
  border-radius:15px;
  box-shadow:0 0 20px #00bfff;
}

/* INPUT */
input{
  display:block;
  margin:10px auto;
  padding:10px;
  width:250px;
  border:none;
  border-radius:5px;
}

/* BOTÃO */
button{
  margin:10px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#00bfff;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 20px #00bfff;
}
</style>
</head>

<body>

<!-- VIDEO -->
<video id="bgVideo" autoplay loop playsinline controls>
  <source src="bg_compressed.mp4" type="video/mp4">
</video>

<div class="container">

<h1>🔥 GUILD FATAL 🔥</h1>

<div class="box">
  <h3>Login / Cadastro</h3>

  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">

  <button onclick="login()">Entrar</button>
  <button onclick="criarConta()">Criar Conta</button>
</div>

</div>

<!-- FIREBASE CORRETO -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBUPcIonbLaTWv6SnhbZghlU51Tx6MT0z8",
  authDomain: "fatal-guild.firebaseapp.com",
  projectId: "fatal-guild",
  storageBucket: "fatal-guild.firebasestorage.app",
  messagingSenderId: "67435581794",
  appId: "1:67435581794:web:d13913ab32cb04a5bddc3b",
  measurementId: "G-X05T2S8MV0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// CRIAR CONTA
window.criarConta = function(){
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  createUserWithEmailAndPassword(auth, email, senha)
  .then(() => alert("Conta criada com sucesso!"))
  .catch(err => alert(err.message));
}

// LOGIN
window.login = function(){
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  signInWithEmailAndPassword(auth, email, senha)
  .then(() => alert("Login realizado!"))
  .catch(err => alert(err.message));
}
</script>

</body>
</html>
