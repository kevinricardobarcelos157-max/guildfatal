<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Guild Fatal GOD</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background:black;
  overflow-x:hidden;
  animation:entrada 0.8s ease;
}

/* 💥 TREMOR AO ENTRAR */
@keyframes entrada{
  0%{transform:scale(1.1) translate(0);}
  20%{transform:translate(-10px,5px);}
  40%{transform:translate(10px,-5px);}
  60%{transform:translate(-5px,5px);}
  80%{transform:translate(5px,-5px);}
  100%{transform:scale(1) translate(0);}
}

/* VIDEO */
#bgVideo{
  position:fixed;
  top:50%;
  left:50%;
  width:100%;
  height:100%;
  object-fit:cover;
  transform:translate(-50%, -50%) scale(0.75);
  z-index:-6;
  filter:brightness(0.4);
}

/* CANVAS */
canvas{position:fixed;top:0;left:0;pointer-events:none;}
#lightning{z-index:-5;}
#lava{z-index:-4;}
#magic{z-index:-3;}

/* NOVO CANVAS PARTÍCULAS */
#particles{z-index:-2;}

/* TITULO */
#tituloCentral{
  position:absolute;
  top:4%;
  left:50%;
  transform:translateX(-50%);
  width:100%;
}

#tituloCentral h1{
  font-size: clamp(48px, 7vw, 90px);
  font-family:'Cinzel', serif;
  color:#ff2a00;
  letter-spacing:4px;
  position:relative;
  display:inline-block;

  text-shadow:
    0 0 10px red,
    0 0 20px red,
    0 0 40px red,
    2px 2px 0 black,
    4px 4px 0 #300,
    6px 6px 20px rgba(0,0,0,0.9);

  animation:tremor 0.15s infinite;
}

/* FOGO */
#tituloCentral h1::before{
  content:attr(data-text);
  position:absolute;
  left:0;
  top:0;
  color:orange;
  z-index:-1;
  filter:blur(8px);
  opacity:0.7;
  animation:fogo 1s infinite alternate;
}

/* BRILHO */
#tituloCentral h1::after{
  content:'';
  position:absolute;
  top:0;
  left:-100%;
  width:60%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.9),transparent);
  transform:skewX(-25deg);
  animation:brilho 3s infinite;
}

@keyframes brilho{
  0%{left:-100%;}
  100%{left:200%;}
}

@keyframes fogo{
  from{transform:translateY(0);}
  to{transform:translateY(-5px);}
}

@keyframes tremor{
  0%{transform:translate(0);}
  25%{transform:translate(1px,-1px);}
  50%{transform:translate(-1px,1px);}
  75%{transform:translate(1px,1px);}
  100%{transform:translate(0);}
}

/* LOGO */
#logoMain{
  position:absolute;
  top:17%;
  left:50%;
  transform:translateX(-50%);
}
#logoMain img{
  width:220px;
  filter:drop-shadow(0 0 25px red);
}

/* CONTAINER */
#container{
  position:absolute;
  top:58%;
  left:50%;
  transform:translate(-50%,-50%);
}

/* BOX */
.box{
  background:rgba(20,0,0,0.95);
  padding:18px;
  border:1px solid red;
  width:300px;
  box-shadow:0 0 30px red;
  margin-bottom:8px;
}

input,select{
  width:90%;
  padding:8px;
  background:#111;
  border:1px solid red;
  color:white;
}

.btnMU{
  padding:10px;
  background:linear-gradient(45deg,#3a0000,#a00000);
  border:none;
  color:white;
  margin-top:5px;
  width:100%;
  cursor:pointer;
}

#chatBox{
  height:100px;
  overflow:auto;
}
</style>
</head>

<body>

<!-- 🔊 SOM BOSS -->
<audio id="bossSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<video id="bgVideo" autoplay muted loop>
  <source src="bg_compressed.mp4" type="video/mp4">
</video>

<canvas id="lightning"></canvas>
<canvas id="lava"></canvas>
<canvas id="magic"></canvas>
<canvas id="particles"></canvas>

<div id="tituloCentral">
  <h1 data-text="👑☠️ GUILD FATAL ☠️👑">👑☠️ GUILD FATAL ☠️👑</h1>
</div>

<div id="logoMain">
  <img src="logo1.jpg">
</div>

<div id="container">

<!-- (SEU SISTEMA COMPLETO CONTINUA IGUAL AQUI) -->

</div>

<audio id="shineSound" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"></audio>

<script>
const API="https://fatalguild-api.onrender.com";

/* 🔊 SOM AO ENTRAR */
window.onload=()=>{
document.getElementById("bossSound").play().catch(()=>{});
};

/* SOM DO BRILHO */
setInterval(()=>{
document.getElementById("shineSound").play().catch(()=>{});
},3000);

/* ✨ PARTÍCULAS DO NOME */
let pCanvas=document.getElementById("particles");
let pCtx=pCanvas.getContext("2d");
pCanvas.width=innerWidth;
pCanvas.height=innerHeight;

let particles=[];

function spawnParticle(){
let title=document.getElementById("tituloCentral").getBoundingClientRect();

particles.push({
x:title.left + Math.random()*title.width,
y:title.top + title.height/2,
vx:(Math.random()-0.5)*2,
vy:-Math.random()*2,
life:60
});
}

function drawParticles(){
pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);

particles.forEach((p,i)=>{
p.x+=p.vx;
p.y+=p.vy;
p.life--;

pCtx.fillStyle="red";
pCtx.fillRect(p.x,p.y,2,2);

if(p.life<=0) particles.splice(i,1);
});

if(Math.random()<0.5) spawnParticle();

requestAnimationFrame(drawParticles);
}

drawParticles();

/* SEU JS ORIGINAL CONTINUA NORMAL AQUI */
</script>

</body>
  </html>
