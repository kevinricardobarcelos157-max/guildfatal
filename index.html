<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🔥 Guild Fatal GOD 🔥</title>

<style>
body {
  background: radial-gradient(circle at center, #000000 0%, #140000 40%, #000000 100%);
    color: #fff;
      font-family: Arial;
        text-align: center;
        }
        h1 {
          color: gold;
            text-shadow: 0 0 10px red,0 0 20px red,0 0 30px gold,0 0 60px gold;
            }
            .box {
              background:rgba(0,0,0,0.85);
                border:1px solid #550000;
                  box-shadow:0 0 15px red;
                    margin:10px;
                      padding:10px;
                      }
                      input,button {
                        margin:5px;
                          padding:5px;
                          }
                          #admin,#painelGM{display:none;}
                          #chatBox,#dmBox{height:150px;overflow:auto;border:1px solid red;margin-top:5px;}
                          </style>
                          </head>

                          <body>

                          <h1>🔥 GUILD FATAL 🔥</h1>

                          <!-- LOGIN -->
                          <div class="box">
                          <h2>🔐 Login</h2>
                          <input id="loginPlayer" placeholder="Login">
                          <input id="senhaPlayer" type="password" placeholder="Senha">
                          <button onclick="login()">Entrar</button>
                          <button onclick="logout()">Sair</button>
                          </div>

                          <!-- RECUPERAR -->
                          <div class="box">
                          <h2>🔁 Recuperar Senha</h2>
                          <input id="emailRecuperar" placeholder="Login">
                          <button onclick="recuperarSenha()">Recuperar</button>
                          </div>

                          <!-- CADASTRO -->
                          <div class="box">
                          <h2>Criar Conta</h2>
                          <input id="nome" placeholder="Nick">
                          <input id="classe" placeholder="Classe">
                          <input id="resets" placeholder="Resets">
                          <input id="loginConta" placeholder="Login">
                          <input id="senhaConta" type="password" placeholder="Senha">
                          <button onclick="criarConta()">Criar Conta</button>
                          </div>

                          <!-- CHAT -->
                          <div class="box">
                          <h2>💬 Chat Global</h2>
                          <div id="chatBox"></div>
                          <input id="nickChat" placeholder="Nick">
                          <input id="msg" placeholder="Mensagem">
                          <button onclick="enviarMsg()">Enviar</button>
                          </div>

                          <!-- DM -->
                          <div class="box">
                          <h2>📩 DM</h2>
                          <input id="para" placeholder="Para">
                          <input id="msgPrivada" placeholder="Mensagem">
                          <button onclick="enviarDM()">Enviar</button>
                          <button onclick="toggleDM()">Mostrar/Esconder</button>
                          <div id="dmBox"></div>
                          </div>

                          <!-- RESTO -->
                          <div class="box"><h2>🏆 Ranking</h2><ul id="ranking"></ul></div>
                          <div class="box"><h2>Membros</h2><ul id="listaPublica"></ul></div>
                          <div class="box"><h2>📜 Histórico</h2><ul id="historico"></ul></div>

                          <div class="box">
                          <h2>Admin</h2>
                          <input id="senhaAdmin" type="password">
                          <button onclick="loginAdmin()">Entrar</button>
                          </div>

                          <div id="admin">
                          <ul id="pendentes"></ul>
                          <ul id="membros"></ul>
                          </div>

                          <div id="painelGM" class="box">
                          <h2>👑 GM</h2>
                          <input id="nickGM">
                          <input id="resetGM">
                          <button onclick="darReset()">+Reset</button>
                          </div>

                          <script type="module">
                          import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
                          import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
                          import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

                          const app = initializeApp({
                          apiKey:"AIza...",
                          authDomain:"fatal-guild.firebaseapp.com",
                          projectId:"fatal-guild"
                          });

                          const db = getFirestore(app);
                          const auth = getAuth(app);

                          let ultimoEnvio = 0;
                          let mostrarDM = true;

                          // LOGIN
                          window.login = async ()=>{
                          await signInWithEmailAndPassword(auth, loginPlayer.value+"@guild.com", senhaPlayer.value);
                          alert("Logado");
                          };

                          // LOGOUT
                          window.logout = ()=>signOut(auth);

                          // RECUPERAR
                          window.recuperarSenha = ()=>{
                          sendPasswordResetEmail(auth, emailRecuperar.value+"@guild.com");
                          alert("Email enviado");
                          };

                          // CADASTRO
                          window.criarConta = async ()=>{
                          const user = await createUserWithEmailAndPassword(auth, loginConta.value+"@guild.com", senhaConta.value);

                          await addDoc(collection(db,"membros"),{
                          nome:nome.value,
                          classe:classe.value,
                          resets:Number(resets.value),
                          uid:user.user.uid,
                          status:"pendente",
                          cargo:"MEMBRO"
                          });
                          };

                          // CHAT
                          window.enviarMsg = async ()=>{
                          if(Date.now()-ultimoEnvio<2000)return alert("Sem flood");
                          ultimoEnvio=Date.now();

                          await addDoc(collection(db,"chat"),{
                          nick:nickChat.value,
                          msg:msg.value
                          });
                          msg.value="";
                          };

                          // DM
                          window.toggleDM=()=>dmBox.style.display=mostrarDM=!mostrarDM?"block":"none";

                          window.enviarDM=async ()=>{
                          await addDoc(collection(db,"dm"),{
                          de:nickChat.value,
                          para:para.value,
                          msg:msgPrivada.value
                          });
                          };

                          // ADMIN
                          window.loginAdmin=()=>{
                          if(senhaAdmin.value==="admin123"){
                          admin.style.display="block";
                          painelGM.style.display="block";
                          }
                          };

                          // GM
                          async function buscar(n){
                          const s=await getDocs(collection(db,"membros"));
                          let p=null;
                          s.forEach(d=>{if(d.data().nome===n)p={id:d.id,...d.data()};});
                          return p;
                          }

                          window.darReset=async ()=>{
                          const p=await buscar(nickGM.value);
                          await updateDoc(doc(db,"membros",p.id),{resets:p.resets+Number(resetGM.value)});
                          };

                          // REALTIME
                          onSnapshot(collection(db,"membros"),snap=>{
                          listaPublica.innerHTML="";
                          ranking.innerHTML="";
                          let lista=[];
                          snap.forEach(d=>{
                          const data=d.data();
                          if(data.status==="aprovado"){
                          lista.push(data);
                          listaPublica.innerHTML+=`<li>${data.nome}</li>`;
                          }
                          });
                          lista.sort((a,b)=>b.resets-a.resets);
                          lista.slice(0,5).forEach((p,i)=>{
                          ranking.innerHTML+=`<li>#${i+1} ${p.nome}</li>`;
                          });
                          });

                          onSnapshot(collection(db,"chat"),snap=>{
                          chatBox.innerHTML="";
                          snap.forEach(d=>{
                          const m=d.data();
                          chatBox.innerHTML+=`<div><b>${m.nick}:</b> ${m.msg}</div>`;
                          });
                          });

                          onSnapshot(collection(db,"dm"),snap=>{
                          dmBox.innerHTML="";
                          snap.forEach(d=>{
                          const m=d.data();
                          if(m.para===nickChat.value||m.de===nickChat.value){
                          dmBox.innerHTML+=`<div>${m.de}→${m.para}: ${m.msg}</div>`;
                          }
                          });
                          });
                          </script>

                          </body>
                          </html>
