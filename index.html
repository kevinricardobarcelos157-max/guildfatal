<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🔥 Guild Fatal GOD 🔥</title>

<style>
body {
  margin:0;
  background:black;
  color:#fff;
  font-family: Arial;
  text-align:center;
  overflow:hidden;
}

/* 🎥 VIDEO */
#bgVideo{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
  filter:brightness(0.3);
}

/* 🌑 OVERLAY ESCURO */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  z-index:-1;
}

/* 🔥 TEXTO NO MEIO */
#centerText{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

#centerText h1{
  font-size:40px;
  color:gold;
  text-shadow:0 0 20px red,0 0 40px gold;
}

#centerText p{
  margin-top:10px;
  font-size:18px;
}

/* 📦 BOXES */
.box{
  background:rgba(0,0,0,0.8);
  border:1px solid red;
  margin:10px;
  padding:10px;
}

/* 🔒 ADMIN ESCONDIDO */
#admin{
  display:none;
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop id="bgVideo">
  <source src="bg_compressed.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- TEXTO CENTRAL -->
<div id="centerText">
  <h1>🔥 GUILD FATAL 🔥</h1>
  <p>Domine o ranking. Prove seu poder.</p>
</div>

<!-- 🎵 MUSICA -->
<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mp3">
</audio>

<!-- CADASTRO -->
<div class="box">
<input id="nome" placeholder="Nick">
<input id="classe" placeholder="Classe">
<input id="resets" placeholder="Resets">
<button onclick="enviar()">Entrar</button>
</div>

<!-- LISTAS -->
<div class="box"><ul id="ranking"></ul></div>
<div class="box"><ul id="listaPublica"></ul></div>

<!-- LOGIN ADMIN -->
<div class="box">
<input id="senha" type="password" placeholder="Senha admin">
<button onclick="login()">Admin</button>
</div>

<div id="admin">
<ul id="pendentes"></ul>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app=initializeApp({
  apiKey:"AIza...",
  authDomain:"fatal-guild.firebaseapp.com",
  projectId:"fatal-guild"
});
const db=getFirestore(app);

/* LOGIN */
window.login = () => {
  const senhaInput = document.getElementById("senha");
  const adminPanel = document.getElementById("admin");

  if (senhaInput.value === "admin123") {
    adminPanel.style.display = "block";
  } else {
    alert("Senha errada");
  }
};

/* CADASTRO */
window.enviar = async () => {
  await addDoc(collection(db,"membros"),{
    nome:nome.value,
    classe:classe.value,
    resets:Number(resets.value),
    status:"pendente"
  });
};

/* LISTA */
onSnapshot(collection(db,"membros"),snap=>{
  listaPublica.innerHTML="";
  ranking.innerHTML="";
  pendentes.innerHTML="";
  let lista=[];

  snap.forEach(d=>{
    let data=d.data();
    let id=d.id;

    if(data.status==="aprovado"){
      lista.push(data);
      listaPublica.innerHTML+=`<li>${data.nome}</li>`;
    }

    if(data.status==="pendente"){
      pendentes.innerHTML+=`
        <li>${data.nome}
        <button onclick="aprovar('${id}')">OK</button>
        </li>`;
    }
  });

  lista.sort((a,b)=>b.resets-a.resets);
  lista.slice(0,5).forEach((p,i)=>{
    ranking.innerHTML+=`<li>#${i+1} ${p.nome} (${p.resets})</li>`;
  });
});

/* APROVAR */
window.aprovar = async (id) => {
  await updateDoc(doc(db,"membros",id),{status:"aprovado"});
};

/* 🎵 MUSICA AUTO */
const musica = document.getElementById("musica");
document.addEventListener("click",()=>{
  musica.play();
});
</script>

</body>
</html>
