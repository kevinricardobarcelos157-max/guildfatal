<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🔥 💀Guild Fatal💀 GOD 🔥</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<style>
/* ===== SEU CSS ORIGINAL (NÃO MEXI) ===== */
body{margin:0;font-family:Arial;color:white;text-align:center;background:black;}

#bgVideo{
  position:fixed;top:50%;left:50%;
  width:100%;height:100%;
  object-fit:cover;
  transform:translate(-50%,-50%) scale(0.75);
  z-index:-2;filter:brightness(0.4);
}

#tituloCentral{position:absolute;top:10%;left:50%;transform:translateX(-50%);}
#tituloCentral h1{
  margin:0;font-size:44px;font-family:'Cinzel', serif;
  letter-spacing:3px;text-transform:uppercase;color:#8b0000;
  text-shadow:2px 2px 0 #000,4px 4px 0 #220000,6px 6px 0 #440000,8px 8px 10px black;
}

#subTitulo{margin-top:5px;font-size:18px;color:#ccc;letter-spacing:2px;font-family:'Cinzel', serif;}

#container{
  position:absolute;top:55%;left:50%;
  transform:translate(-50%, -50%);
  width:90%;max-width:350px;
}

.box{
  background:rgba(0,0,0,0.85);
  border:1px solid red;
  margin:10px;padding:15px;
}

/* ===== DRAGÕES ===== */
.dragon{
  position:fixed;
  width:160px;
  z-index:9999;
  pointer-events:none;
}

.dragon1{animation: fly1 15s linear infinite;}
.dragon2{animation: fly2 18s linear infinite; transform: scaleX(-1);}

@keyframes fly1{
  0%{ left:-200px; top:200px;}
  100%{ left:110%; top:150px;}
}

@keyframes fly2{
  0%{ left:110%; top:300px;}
  100%{ left:-200px; top:250px;}
}

/* ===== 🔥 BOSS SPAWN ===== */
.boss{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  width:300px;
  z-index:10000;
  animation: bossSpawn 1s ease-out forwards;
}

@keyframes bossSpawn{
  0%{ transform:translate(-50%,-50%) scale(0); opacity:0;}
  50%{ transform:translate(-50%,-50%) scale(1.3); opacity:1;}
  100%{ transform:translate(-50%,-50%) scale(1); }
}

/* 🔥 FLASH NA TELA */
.flash{
  position:fixed;
  width:100%;
  height:100%;
  background:red;
  opacity:0;
  pointer-events:none;
  z-index:9999;
  animation: flashAnim 0.5s;
}

@keyframes flashAnim{
  0%{opacity:0;}
  50%{opacity:0.8;}
  100%{opacity:0;}
}

/* 🔥 FOGO */
.fireDragon{
  position:fixed;
  width:12px;height:12px;
  background:orange;
  border-radius:50%;
  filter:blur(6px);
  animation: fireMove 0.6s linear forwards;
}

@keyframes fireMove{
  from{transform:translate(0,0);}
  to{transform:translate(-40px,20px);opacity:0;}
}
</style>
</head>

<body>

<video id="bgVideo" autoplay muted loop>
  <source src="bg_compressed.mp4" type="video/mp4">
</video>

<div id="tituloCentral">
  <h1>🔥 GUILD FATAL 🔥</h1>
  <div id="subTitulo">Fatal Guilds</div>
</div>

<div id="container">
  <div class="box">Login aqui...</div>
</div>

<!-- 🐉 DRAGÕES -->
<img src="dragon.png" class="dragon dragon1" id="d1">
<img src="dragon.png" class="dragon dragon2" id="d2">

<!-- 🐉 BOSS -->
<img src="dragon.png" class="boss" id="boss">

<!-- 🔊 SOM -->
<audio id="roar" src="roar.mp3"></audio>

<script>
/* 🐉 SEGUIR MOUSE */
document.addEventListener("mousemove",(e)=>{
  const d1 = document.getElementById("d1");
  d1.style.top = e.clientY+"px";
});

/* 🔥 FOGO */
setInterval(()=>{
  const d1 = document.getElementById("d1");
  const fire = document.createElement("div");
  fire.className="fireDragon";
  fire.style.left = (d1.offsetLeft+80)+"px";
  fire.style.top = (d1.offsetTop+40)+"px";
  document.body.appendChild(fire);
  setTimeout(()=>fire.remove(),600);
},200);

/* 💀 BOSS SPAWN + SOM */
window.onload = ()=>{
  setTimeout(()=>{
    const flash = document.createElement("div");
    flash.className="flash";
    document.body.appendChild(flash);

    const roar = document.getElementById("roar");
    roar.play();

    setTimeout(()=>flash.remove(),500);
  },2000);
};
</script>

</body>
</html>
