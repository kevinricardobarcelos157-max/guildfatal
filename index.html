<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Guild Fatal</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      overflow: hidden;
      color: white;
    }

    /* 🎥 Seu vídeo continua funcionando */
    #bgVideo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* 🎛️ Painel de login */
    #painel {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.7);
      padding: 25px;
      border-radius: 10px;
      text-align: center;
      width: 300px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 5px;
      background: red;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- 🎥 SEU VÍDEO (mantém o seu arquivo) -->
  <video autoplay muted loop id="bgVideo">
    <source src="bg_compressed.mp4" type="video/mp4">
  </video>

  <!-- 🔐 PAINEL -->
  <div id="painel">
    <h2>Login</h2>
    <input type="text" id="usuario" placeholder="Usuário">
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>

  <!-- 🎵 SUA MÚSICA (se já tiver, mantém aqui) -->
  <!-- exemplo:
  <audio autoplay loop>
    <source src="musica.mp3" type="audio/mp3">
  </audio>
  -->

  <!-- ⚡ SCRIPT (CORRIGIDO) -->
  <script>
    function login() {
      const user = document.getElementById("usuario");
      const pass = document.getElementById("senha");
      const painel = document.getElementById("painel");

      // evita quebrar o site
      if (!user || !pass || !painel) {
        console.error("Erro: IDs não encontrados");
        return;
      }

      const u = user.value.trim();
      const p = pass.value.trim();

      if (u === "" || p === "") {
        alert("Preenche tudo");
        return;
      }

      // 👉 AQUI você pode trocar login depois
      if (u === "admin" && p === "123") {
        painel.style.display = "none";

        // exemplo: mostrar conteúdo depois do login
        console.log("Entrou");
      } else {
        alert("Login inválido");
      }
    }
  </script>

</body>
</html>
