<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🔥 Guild Fatal GOD 🔥</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background:black;
}

#bgVideo{
  position:fixed;
  top:50%;
  left:50%;
  width:100%;
  height:100%;
  object-fit:cover;
  transform:translate(-50%,-50%) scale(0.75);
  z-index:-2;
  filter:brightness(0.7) contrast(1.2);
}

body::after{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(255,0,0,0.08);
  z-index:-1;
}

#container{
  position:absolute;
  top:55%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90%;
  max-width:350px;
}

.box{
  background:rgba(20,0,0,0.75);
  border:1px solid red;
  margin:10px;
  padding:15px;
  box-shadow:0 0 15px red;
}

input{
  width:90%;
  padding:8px;
  background:#1a0000;
  border:1px solid red;
  color:white;
  box-shadow:0 0 5px red;
}

.btnMU{
  padding:10px;
  background:linear-gradient(45deg,#5a0000,#ff0000);
  border:none;
  color:white;
  margin-top:5px;
  width:100%;
  box-shadow:0 0 10px red;
  transition:0.2s;
}

.btnMU:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px red;
}

h1, h3{
  text-shadow:0 0 10px red;
}
</style>
</head>

<body>

<video id="bgVideo" autoplay muted loop>
  <source src="bg_compressed.mp4" type="video/mp4">
</video>

<div id="tituloCentral">
  <h1>🔥 GUILD FATAL 🔥</h1>
  <div id="subTitulo">Fatal Guilds</div>
</div>

<div id="fire"></div>

<div id="logoMain">
  <img src="logo1.jpg">
</div>

<div id="container">

  <div class="box">
    <h3>Conta</h3>

    <input id="email" placeholder="Email"><br><br>
    <input id="senha" type="password" placeholder="Senha"><br><br>

    <button class="btnMU" onclick="registrar()">Cadastrar</button>
    <button class="btnMU" onclick="login()">Entrar</button>
    <button class="btnMU" onclick="virarAdminSeguro()">Virar Líder 👑</button>
  </div>

  <div class="box">
    <input id="nick" placeholder="Nick"><br><br>
    <input id="classe" placeholder="Classe"><br><br>
    <input id="resets" placeholder="Resets"><br><br>
    <button class="btnMU" onclick="criarPersonagem()">Cadastrar personagem</button>
  </div>

  <div class="box" id="rankingBox"><h3>🏆 Ranking</h3></div>
  <div class="box" id="membrosBox"><h3>📜 Membros</h3></div>

  <div class="box">
    <h3>💬 Chat da Guild</h3>
    <div id="chatBox" style="height:150px;overflow:auto;text-align:left;"></div>
    <input id="msg" placeholder="Digite mensagem...">
    <button class="btnMU" onclick="enviarMsg()">Enviar</button>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBUPcIonbLaTWv6SnhbZghlU51Tx6MT0z8",
  authDomain: "fatal-guild.firebaseapp.com",
  projectId: "fatal-guild"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let usuarioAtual = null;
let meuCargo = null;

async function registrar(){
  try{
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    const cred = await auth.createUserWithEmailAndPassword(email, senha);

    await cred.user.sendEmailVerification();

    await db.collection("usuarios").doc(cred.user.uid).set({
      email,
      cargo:"Membro"
    });

    alert("Conta criada! Verifique o email 🔥");
  }catch(e){ alert(e.message); }
}

async function login(){
  try{
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    const cred = await auth.signInWithEmailAndPassword(email, senha);

    if(!cred.user.emailVerified){
      alert("Verifique seu email!");
      return;
    }

    usuarioAtual = cred.user;

    const doc = await db.collection("usuarios").doc(usuarioAtual.uid).get();
    meuCargo = doc.exists ? doc.data().cargo : "Membro";

    alert("🔥 LOGADO 🔥");

    atualizarSistema();
    carregarChat();
  }catch(e){ alert(e.message); }
}

async function virarAdminSeguro(){
  if(!usuarioAtual) return;

  const ref = db.collection("usuarios").doc(usuarioAtual.uid);
  const doc = await ref.get();

  if(doc.exists && doc.data().cargo === "Membro"){
    await ref.update({cargo:"Lider"});
    meuCargo="Lider";
    alert("Agora você é Líder 👑");
    atualizarSistema();
  }
}

async function criarPersonagem(){
  if(!usuarioAtual){
    alert("Faça login!");
    return;
  }

  await db.collection("personagens").add({
    uid: usuarioAtual.uid,
    nick: document.getElementById("nick").value,
    classe: document.getElementById("classe").value,
    resets: Number(document.getElementById("resets").value)||0
  });

  atualizarSistema();
}

async function atualizarSistema(){
  let rankingHTML="<h3>🏆 Ranking</h3>";
  let membrosHTML="<h3>📜 Membros</h3>";

  const ranking=await db.collection("personagens").orderBy("resets","desc").get();

  ranking.forEach((doc,i)=>{
    const p=doc.data();
    rankingHTML+=i===0
      ? `<p style="color:gold;">👑 ${p.nick} - ${p.resets}</p>`
      : `<p>${p.nick} - ${p.resets}</p>`;
  });

  const membros=await db.collection("usuarios").get();

  membros.forEach(doc=>{
    const u=doc.data();
    membrosHTML+=`
      <p>
        ${u.email} - ${u.cargo}
        ${meuCargo==="Lider"?`<button onclick="promover('${doc.id}')">⬆️</button>`:""}
      </p>
    `;
  });

  rankingBox.innerHTML=rankingHTML;
  membrosBox.innerHTML=membrosHTML;
}

async function promover(uid){
  if(meuCargo!=="Lider") return;

  const ref=db.collection("usuarios").doc(uid);
  const doc=await ref.get();
  if(!doc.exists) return;

  const user=doc.data();

  let novo="Membro";
  if(user.cargo==="Membro") novo="Oficial";
  else if(user.cargo==="Oficial") novo="Lider";

  await ref.update({cargo:novo});
  atualizarSistema();
}

/* CHAT */
function carregarChat(){
  db.collection("chat").orderBy("time")
  .onSnapshot(snap=>{
    let html="";
    snap.forEach(doc=>{
      const m=doc.data();
      html+=`<p><b>${m.user}:</b> ${m.texto}</p>`;
    });
    chatBox.innerHTML=html;
  });
}

async function enviarMsg(){
  if(!usuarioAtual) return;

  await db.collection("chat").add({
    user:usuarioAtual.email,
    texto:document.getElementById("msg").value,
    time:Date.now()
  });

  document.getElementById("msg").value="";
}

auth.onAuthStateChanged(async user=>{
  if(user){
    usuarioAtual=user;

    const doc=await db.collection("usuarios").doc(user.uid).get();
    meuCargo=doc.exists?doc.data().cargo:"Membro";

    atualizarSistema();
    carregarChat();
  }
});

/* 🔥 efeito */
const fire=document.getElementById("fire");
setInterval(()=>{
  const p=document.createElement("div");
  p.className="fireParticle";
  p.style.left=Math.random()*260+"px";
  fire.appendChild(p);
  setTimeout(()=>p.remove(),2000);
},100);
</script>

</body>
  </html>
