<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Guild Fatal</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  overflow:hidden;
  color:white;
}

#bgVideo{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  filter:brightness(0.6);
}

.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  text-align:center;
}

h1{
  font-size:48px;
  margin-bottom:20px;
  color:#00bfff;
  text-shadow:0 0 20px #00bfff;
}

.box{
  background:rgba(0,0,0,0.7);
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 20px #00bfff;
}

input{
  display:block;
  margin:10px auto;
  padding:10px;
  width:250px;
  border:none;
  border-radius:5px;
}

button{
  margin:10px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#00bfff;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 20px #00bfff;
}
</style>
</head>

<body>

<video id="bgVideo" autoplay loop playsinline muted>
  <source src="bg_compressed.mp4" type="video/mp4">
</video>

<div class="container">

<h1>🔥 GUILD FATAL 🔥</h1>

<div class="box">
  <h3>Login</h3>

  <input id="loginUser" placeholder="Usuário (email)">
  <input id="loginPass" type="password" placeholder="Senha">

  <button onclick="entrar()">Entrar</button>
  <button onclick="criarConta()">Criar Conta</button>
</div>

</div>

<!-- FIREBASE (VERSÃO COMPATÍVEL) -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBUPcIonbLaTWv6SnhbZghlU51Tx6MT0z8",
  authDomain: "fatal-guild.firebaseapp.com",
  projectId: "fatal-guild",
  storageBucket: "fatal-guild.firebasestorage.app",
  messagingSenderId: "67435581794",
  appId: "1:67435581794:web:d13913ab32cb04a5bddc3b"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// CRIAR CONTA
function criarConta(){
  const email = document.getElementById("loginUser").value;
  const senha = document.getElementById("loginPass").value;

  auth.createUserWithEmailAndPassword(email, senha)
  .then(() => alert("Conta criada com sucesso!"))
  .catch(e => alert(e.message));
}

// LOGIN
function entrar(){
  const email = document.getElementById("loginUser").value;
  const senha = document.getElementById("loginPass").value;

  auth.signInWithEmailAndPassword(email, senha)
  .then(() => {
    alert("Login efetuado com sucesso!");
    window.location.href = "painel.html";
  })
  .catch(e => alert(e.message));
}
</script>

</body>
</html>
