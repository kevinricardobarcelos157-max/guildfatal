<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Guild Fatal GOD</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background:black;
  overflow-x:hidden;
}

/* VIDEO */
#bgVideo{
  position:fixed;
  top:50%;
  left:50%;
  width:100%;
  height:100%;
  object-fit:cover;
  transform:translate(-50%, -50%) scale(0.75);
  z-index:-6;
  filter:brightness(0.4);
}

/* CANVAS */
canvas{position:fixed;top:0;left:0;pointer-events:none;}
#lightning{z-index:-5;}
#lava{z-index:-4;}
#magic{z-index:-3;}
#particles{z-index:-2;}

/* TITULO */
#tituloCentral{
  position:absolute;
  top:3%;
  left:50%;
  transform:translateX(-50%);
  width:100%;
}

/* 👑 NOME FIXO (SEM ANIMAÇÃO) */
#tituloCentral h1{
  font-size: clamp(48px, 7vw, 90px);
  font-family:'Cinzel', serif;
  color:#ff2a00;
  letter-spacing:4px;
  display:inline-block;
  text-shadow:0 0 40px red, 4px 4px 0 black;
}

/* REMOVE APENAS OS EFEITOS ANIMADOS */
#tituloCentral h1::before,
#tituloCentral h1::after{
  content:none;
}

/* animações continuam no código mas NÃO aplicadas */
@keyframes brilho{100%{left:200%;}}
@keyframes fogo{to{transform:translateY(-5px);}}
@keyframes tremor{
  25%{transform:translate(1px,-1px);}
  50%{transform:translate(-1px,1px);}
}

/* 🔒 LOGO FIXO */
#logoMain{
  position:absolute;
  top:17%;
  left:50%;
  transform:translateX(-50%);
}

#logoMain img{
  width:220px;
  animation:logoPulse 2.5s ease-in-out infinite;
  filter:
    drop-shadow(0 0 10px red)
    drop-shadow(0 0 20px red);
}

@keyframes logoPulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

/* 🔥 CONTAINER FIXO (INALTERADO) */
#container{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
}

/* 🚫 TRAVA TUDO MENOS O NOME (original mantido) */
#container,
.box,
#logoMain{
  animation:none !important;
}

/* BOX */
.box{
  background:rgba(20,0,0,0.95);
  padding:18px;
  border:1px solid red;
  width:300px;
  box-shadow:0 0 30px red;
  margin-bottom:8px;
}

input,select{
  width:90%;
  padding:8px;
  background:#111;
  border:1px solid red;
  color:white;
}

.btnMU{
  padding:10px;
  background:linear-gradient(45deg,#3a0000,#a00000);
  border:none;
  color:white;
  margin-top:5px;
  width:100%;
}

#chatBox{
  height:100px;
  overflow:auto;
}
</style>
</head>

<body>

<audio id="bossSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="shineSound" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"></audio>

<video id="bgVideo" autoplay muted loop>
  <source src="bg_compressed.mp4" type="video/mp4">
</video>

<canvas id="lightning"></canvas>
<canvas id="lava"></canvas>
<canvas id="magic"></canvas>
<canvas id="particles"></canvas>

<div id="tituloCentral">
  <h1>👑☠️ GUILD FATAL ☠️👑</h1>
</div>

<div id="logoMain">
  <img src="logo1.jpg">
</div>

<div id="container">

<div class="box">
<h3>Conta</h3>
<input id="email" placeholder="Email"><br><br>
<input id="senha" type="password" placeholder="Senha"><br><br>
<button class="btnMU" id="btnRegister">Cadastrar</button>
<button class="btnMU" id="btnLogin">Entrar</button>
<button class="btnMU" id="btnLogout">Sair</button>
</div>

<div class="box">
<input id="nick" placeholder="Nick"><br><br>
<input id="classe" placeholder="Classe"><br><br>
<input id="resets" placeholder="Resets"><br><br>
<input id="level" placeholder="Level"><br><br>
<select id="cargo">
<option>Membro</option>
<option>Moderador</option>
<option>Líder</option>
</select><br><br>
<button class="btnMU" id="btnChar">Criar Personagem</button>
</div>

<div class="box">
<input id="guildNome" placeholder="Nome da Guild"><br><br>
<button class="btnMU" id="btnCriarGuild">Criar Guild</button>
<button class="btnMU" id="btnEntrarGuild">Entrar Guild</button>
</div>

<div class="box">
<h3>Chat</h3>
<div id="chatBox"></div>
<input id="msg" placeholder="Mensagem"><br>
<button class="btnMU" id="btnMsg">Enviar</button>
</div>

<div class="box" id="rankingBox"></div>
<div class="box" id="membrosBox"></div>

</div>

<script>
const API="https://fatalguild-api.onrender.com";

/* LOGIN */
btnLogin.onclick=async()=>{
let r=await fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({email:email.value,senha:senha.value})});
let d=await r.json();
if(d.ok){localStorage.setItem("token",d.token);alert("Logado!");}
};

btnRegister.onclick=async()=>{
await fetch(API+"/register",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({email:email.value,senha:senha.value})});
alert("Conta criada!");
};

btnLogout.onclick=()=>localStorage.removeItem("token");

/* CHAT */
btnMsg.onclick=async()=>{
let token=localStorage.getItem("token");
await fetch(API+"/guild/chat",{method:"POST",
headers:{"Content-Type":"application/json","Authorization":token},
body:JSON.stringify({msg:msg.value})});
msg.value="";
};

/* SOM */
window.onload=()=>{bossSound.play().catch(()=>{});};
setInterval(()=>{shineSound.play().catch(()=>{});},3000);

/* VIDEO */
document.body.onclick=()=>{bgVideo.muted=false;bgVideo.play();};
</script>

</body>
  </html>
