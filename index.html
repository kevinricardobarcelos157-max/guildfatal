<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Guild Fatal - FINAL</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
}

/* VIDEO */
#bgVideo{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-5;
  filter:brightness(0.35);
}

/* CANVAS */
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
}
#fireBg{z-index:-4;}
#magic{z-index:-3;}
#lava{z-index:-2;}
#lightning{z-index:-1;}

/* 🔥 LOGO */
.logo{
  text-align:center;
  margin-top:40px;
  font-family:'Cinzel';
}
.logo h1{
  font-size:90px;
  color:red;
  text-shadow:0 0 40px red;
}

/* 🎮 HUD */
#hud{
  position:fixed;
  top:10px;
  left:10px;
  width:200px;
}
.bar{
  height:18px;
  background:#300;
  margin:5px 0;
  border:1px solid red;
}
.hpFill{
  height:100%;
  background:red;
  width:100%;
}

/* 🏆 RANK */
#ranking{
  position:fixed;
  right:10px;
  top:10px;
  background:rgba(0,0,0,0.7);
  padding:10px;
  border:1px solid red;
}

/* 👑 ADMIN */
#admin{
  position:fixed;
  bottom:10px;
  right:10px;
  background:#111;
  padding:10px;
  border:1px solid red;
  display:none;
}

/* 🎯 LOGIN CENTRALIZADO PERFEITO */
#container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

.box{
  background:rgba(20,0,0,0.95);
  padding:20px;
  border:1px solid red;
  width:280px;
  box-shadow:0 0 20px red;
}

input,button{
  width:100%;
  margin:5px 0;
  padding:10px;
  background:black;
  border:1px solid red;
  color:white;
}

button{
  background:linear-gradient(45deg,#5a0000,#ff0000);
  cursor:pointer;
}
button:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<!-- 🎬 VIDEO COM SOM -->
<video id="bgVideo" autoplay muted loop>
  <source src="bg_compressed.mp4" type="video/mp4">
</video>

<canvas id="fireBg"></canvas>
<canvas id="magic"></canvas>
<canvas id="lava"></canvas>
<canvas id="lightning"></canvas>

<!-- LOGO -->
<div class="logo">
  <h1>GUILD FATAL</h1>
</div>

<!-- HUD -->
<div id="hud">
  HP
  <div class="bar"><div id="hp" class="hpFill"></div></div>
</div>

<!-- RANK -->
<ul id="ranking"></ul>

<!-- LOGIN -->
<div id="container">
  <div class="box">
    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin">
  <button onclick="addFakePlayer()">Add Player</button>
</div>

<script>

/* 🔊 LIBERA SOM DO VÍDEO */
document.body.addEventListener("click", ()=>{
  const v=document.getElementById("bgVideo");
  v.muted=false;
  v.play().catch(()=>{});
},{once:true});

/* FIREBASE */
const firebaseConfig={
  apiKey:"SUA_KEY",
  authDomain:"fatal-guild.firebaseapp.com",
  projectId:"fatal-guild"
};
firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

/* LOGIN */
function login(){
  auth.signInWithEmailAndPassword(email.value,senha.value)
  .then(()=>{
    admin.style.display="block";
    carregarRanking();
  });
}

/* RANK */
function carregarRanking(){
  db.collection("players").orderBy("resets","desc")
  .onSnapshot(snap=>{
    ranking.innerHTML="";
    snap.forEach(doc=>{
      let d=doc.data();
      ranking.innerHTML+=`<li>${d.nick} - ${d.resets}</li>`;
    });
  });
}

/* ADMIN */
function addFakePlayer(){
  db.collection("players").add({
    nick:"Player"+Math.floor(Math.random()*100),
    resets:Math.floor(Math.random()*1000)
  });
}

/* HUD HP */
setInterval(()=>{
  hp.style.width=(60+Math.random()*40)+"%";
},2000);

/* 🔥 FOGO */
let f=fireBg.getContext("2d");
fireBg.width=innerWidth;fireBg.height=innerHeight;
setInterval(()=>{
f.fillStyle="orange";
f.fillRect(Math.random()*innerWidth,innerHeight-80,2,6);
},25);

/* ⚡ RAIO */
let l=lightning.getContext("2d");
lightning.width=innerWidth;lightning.height=innerHeight;

function lightningFx(){
l.clearRect(0,0,innerWidth,innerHeight);
if(Math.random()<0.03){
l.strokeStyle="white";
l.beginPath();
l.moveTo(Math.random()*innerWidth,0);
l.lineTo(Math.random()*innerWidth,innerHeight);
l.stroke();
}
requestAnimationFrame(lightningFx);
}
lightningFx();

/* 🌋 LAVA */
let lv=lava.getContext("2d");
lava.width=innerWidth;lava.height=innerHeight;

function lavaFx(){
lv.fillStyle="rgba(255,80,0,0.12)";
lv.fillRect(0,innerHeight-80,innerWidth,80);
requestAnimationFrame(lavaFx);
}
lavaFx();

/* ✨ MAGIA */
let m=magic.getContext("2d");
magic.width=innerWidth;magic.height=innerHeight;

function magicFx(){
m.fillStyle="purple";
m.fillRect(Math.random()*innerWidth,Math.random()*innerHeight,2,2);
requestAnimationFrame(magicFx);
}
magicFx();

</script>

</body>
  </html>
