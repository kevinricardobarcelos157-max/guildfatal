<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Guild Fatal</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      overflow: hidden;
      color: white;
    }

    /* 🎥 Vídeo de fundo */
    #bgVideo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* 🎛️ Painel */
    #painel {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.7);
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    input {
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 5px;
      background: red;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- 🎥 Vídeo -->
  <video autoplay muted loop id="bgVideo">
    <source src="bg_compressed.mp4" type="video/mp4">
  </video>

  <!-- 🎛️ Painel -->
  <div id="painel">
    <h1>Guild Fatal</h1>
    <input type="text" id="nome" placeholder="Digite seu nome">
    <br>
    <button onclick="entrar()">Entrar</button>
  </div>

  <!-- ⚡ SCRIPT NO FINAL (ESSENCIAL) -->
  <script>
    function entrar() {
      const nome = document.getElementById("nome").value;

      if (nome === "") {
        alert("Digite um nome!");
        return;
      }

      alert("Bem-vindo, " + nome + "!");
    }
  </script>

</body>
      </html>
